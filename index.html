<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="robots" content="index,follow" />
  <meta name="geo.region" content="CN-SC" />
  <meta name="geo.placename" content="成都" />
  <link rel="canonical" href="https://quyawen919.github.io/toudada-talking-business/" />

  <script>
    (function () {
      var path = location.pathname || ''
      window.__SITE_IMG_BASE = /\/web(\/|$)/.test(path) ? '../images' : 'images'
      window.__TD_REPO__ = 'toudada-talking-business'
    })()
  </script>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <noscript>
    <div style="padding:24px;text-align:center;font-family:PingFang SC,sans-serif">
      请启用 JavaScript，或使用本地服务器打开本页（见 web/README.md）
    </div>
  </noscript>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="?p=home" class="site-logo" data-nav="home">
        <img src="images/brand/toudada-talk-business-logo.png" alt="头大大谈经营" class="site-logo-img" onerror="this.style.display='none'" />
        <span class="site-logo-text">头大大谈经营</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="?p=home" class="site-nav-link" data-nav="home">首页</a>
        <a href="?p=consult" class="site-nav-link" data-nav="consult">咨询</a>
        <a href="?p=about" class="site-nav-link" data-nav="about">本人</a>
      </nav>
      <a href="?p=consult&sub=start" class="btn-primary site-header-cta">立即咨询</a>
    </div>
  </header>

  <main id="app" class="site-main" aria-live="polite">
    <div class="card" style="padding:24px;text-align:center">
      <p>加载中…</p>
      <p class="text-muted" style="font-size:13px">若长时间空白，请用本地服务器打开：python3 -m http.server 8765 → http://localhost:8765/web/</p>
    </div>
  </main>

  <footer class="site-footer">
    <p>头大大谈经营 · 个人分享与咨询预约 · 纯属娱乐测测不构成投资建议</p>
    <p class="text-muted">不承诺保证盈利 · 不提供刷单买评 · <a href="?p=local" class="footer-link">同城服务 · 地图入驻</a></p>
  </footer>

  <nav class="mobile-tabbar" aria-label="底部导航">
    <a href="?p=home" class="mobile-tab" data-nav="home">
      <span class="mobile-tab-icon">🏠</span>
      <span class="mobile-tab-label">首页</span>
    </a>
    <a href="?p=consult" class="mobile-tab" data-nav="consult">
      <span class="mobile-tab-icon">💬</span>
      <span class="mobile-tab-label">咨询</span>
    </a>
    <a href="?p=about" class="mobile-tab" data-nav="about">
      <span class="mobile-tab-icon">👤</span>
      <span class="mobile-tab-label">本人</span>
    </a>
  </nav>

  <div id="modal-root"></div>

  <script>
    if (!Element.prototype.matches) {
      Element.prototype.matches = Element.prototype.msMatchesSelector || Element.prototype.webkitMatchesSelector
    }
    if (!Element.prototype.closest) {
      Element.prototype.closest = function (selector) {
        var el = this
        while (el && el.nodeType === 1) {
          if (el.matches(selector)) return el
          el = el.parentElement
        }
        return null
      }
    }
  </script>
  <script src="js/bundle.js" charset="UTF-8" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var logo = document.querySelector('.site-logo-img')
      if (logo && window.__SITE_IMG_BASE) {
        logo.src = window.__SITE_IMG_BASE + '/brand/toudada-talk-business-logo.png'
      }
    })
    setTimeout(function () {
      var app = document.getElementById('app')
      if (!app || app.innerText.indexOf('加载中') < 0) return
      app.innerHTML =
        '<div class="card" style="padding:24px;text-align:center">' +
        '<h2 style="margin:0 0 12px">页面加载未完成</h2>' +
        '<p class="text-muted" style="line-height:1.6">微信内可能拦截了脚本。请点右上角 <strong>··· → 在浏览器中打开</strong></p>' +
        '<p style="margin-top:16px"><a href="?p=home" class="btn-primary" style="display:inline-block;margin:4px">首页</a> ' +
        '<a href="?p=consult" class="btn-secondary" style="display:inline-block;margin:4px">咨询</a> ' +
        '<a href="?p=about" class="btn-secondary" style="display:inline-block;margin:4px">本人</a></p></div>'
    }, 5000)
  </script>
  <script>
    window.addEventListener('error', function (e) {
      var box = document.getElementById('boot-error');
      if (!box) {
        box = document.createElement('div');
        box.id = 'boot-error';
        box.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;background:#fff3f3;border:1px solid #e85d4c;padding:12px 16px;border-radius:12px;font:14px/1.5 PingFang SC,sans-serif;z-index:9999';
        document.body.appendChild(box);
      }
      box.textContent = '页面脚本出错：' + (e.message || '未知错误');
    });
  </script>
</body>
</html>
