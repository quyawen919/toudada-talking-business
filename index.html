<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="头大大谈经营 · 提升经营思维 · 30秒问卷 · 24小时内联系" />
  <title>头大大谈经营</title>
  <script>
    (function () {
      var path = location.pathname || ''
      window.__SITE_IMG_BASE = /\/web(\/|$)/.test(path) ? '../images' : 'images'
      window.__TD_REPO__ = 'toudada-talking-business'
    })()
  </script>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <noscript>
    <div style="padding:24px;text-align:center;font-family:PingFang SC,sans-serif">
      请启用 JavaScript，或使用本地服务器打开本页（见 web/README.md）
    </div>
  </noscript>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="#home" class="site-logo" data-nav="home">
        <img src="images/brand/toudada-talk-business-logo.png" alt="头大大谈经营" class="site-logo-img" onerror="this.style.display='none'" />
        <span class="site-logo-text">头大大谈经营</span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="#home" class="site-nav-link" data-nav="home">首页</a>
        <a href="#consult" class="site-nav-link" data-nav="consult">咨询</a>
        <a href="#about" class="site-nav-link" data-nav="about">本人</a>
      </nav>
      <a href="#consult/start" class="btn-primary site-header-cta">立即咨询</a>
    </div>
  </header>

  <main id="app" class="site-main" aria-live="polite">
    <div class="card" style="padding:24px;text-align:center">
      <p>加载中…</p>
      <p class="text-muted" style="font-size:13px">若长时间空白，请用本地服务器打开：python3 -m http.server 8765 → http://localhost:8765/web/</p>
    </div>
  </main>

  <aside class="qr-float" id="qr-float" aria-label="扫码咨询">
    <button type="button" class="qr-float-toggle" id="qr-toggle" aria-expanded="false">扫码咨询</button>
    <div class="qr-float-panel" id="qr-panel" hidden>
      <p class="qr-float-title">微信扫一扫 · 给我留言咨询</p>
      <canvas id="qr-canvas" width="200" height="200"></canvas>
      <p class="qr-float-url" id="qr-url"></p>
      <p class="qr-float-tip">打开后直达咨询页 · 30秒问卷 · 24小时内联系</p>
    </div>
  </aside>

  <footer class="site-footer">
    <p>头大大谈经营 · 个人分享与咨询预约 · 纯属娱乐测测不构成投资建议</p>
    <p class="text-muted">不承诺保证盈利 · 不提供刷单买评</p>
  </footer>

  <nav class="mobile-tabbar" aria-label="底部导航">
    <a href="#home" class="mobile-tab" data-nav="home">
      <span class="mobile-tab-icon">🏠</span>
      <span class="mobile-tab-label">首页</span>
    </a>
    <a href="#consult" class="mobile-tab" data-nav="consult">
      <span class="mobile-tab-icon">💬</span>
      <span class="mobile-tab-label">咨询</span>
    </a>
    <a href="#about" class="mobile-tab" data-nav="about">
      <span class="mobile-tab-icon">👤</span>
      <span class="mobile-tab-label">本人</span>
    </a>
  </nav>

  <div id="modal-root"></div>

  <script src="js/bundle.js" charset="UTF-8"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var logo = document.querySelector('.site-logo-img')
      if (logo && window.__SITE_IMG_BASE) {
        logo.src = window.__SITE_IMG_BASE + '/brand/toudada-talk-business-logo.png'
      }
    })
  </script>
  <script>
    window.addEventListener('error', function (e) {
      var box = document.getElementById('boot-error');
      if (!box) {
        box = document.createElement('div');
        box.id = 'boot-error';
        box.style.cssText = 'position:fixed;left:16px;right:16px;bottom:16px;background:#fff3f3;border:1px solid #e85d4c;padding:12px 16px;border-radius:12px;font:14px/1.5 PingFang SC,sans-serif;z-index:9999';
        document.body.appendChild(box);
      }
      box.textContent = '页面脚本出错：' + (e.message || '未知错误');
    });
  </script>
</body>
</html>
